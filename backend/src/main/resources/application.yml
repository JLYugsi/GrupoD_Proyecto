spring:
  application:
    name: objetos-perdidos

  datasource:
    url: jdbc:mysql://localhost:3306/campus_lost_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd
    time-zone: America/Guayaquil

server:
  port: 8080
  servlet:
    context-path: /api